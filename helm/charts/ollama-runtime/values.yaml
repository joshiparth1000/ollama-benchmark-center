namespace:
  create: true
  name: ollama

ollama:
  image: ollama/ollama
  tag: 0.30.8
  pullPolicy: Always
  servicePort: 11434
  resources:
    limits:
      nvidia.com/gpu: 1

modelBootstrap:
  enabled: true
  waitSeconds: 120
  recreateExisting: true
  models:
    - name: qwen3-coder-tuned
      modelfile: |
        FROM qwen3-coder:30b
        PARAMETER temperature 0.2
        PARAMETER num_ctx 4096
        PARAMETER num_batch 512
        PARAMETER num_predict 128
        PARAMETER num_gpu -1
        PARAMETER num_thread 8

agent:
  image: ghcr.io/joshiparth1000/ollama-benchmark-center/agent
  tag: "650812d"
  pullPolicy: Always
  servicePort: 9000
  apiKey: dev-agent-key
  gpuAccess:
    enabled: true
    privileged: true
    hostBinPath: /usr/bin
    hostLibFile: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1
    hostDevPath: /dev

persistence:
  hostPath: /data/ollama

nodeSelector:
  accelerator: nvidia

tolerations:
  - key: nvidia.com/gpu
    operator: Equal
    value: "true"
    effect: NoSchedule

service:
  type: NodePort
