apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-runtime
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ollama-runtime.labels" . | nindent 4 }}
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ollama-runtime.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ollama-runtime.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- if .Values.modelBootstrap.enabled }}
      annotations:
        checksum/model-bootstrap: {{ toJson .Values.modelBootstrap | sha256sum }}
      {{- end }}
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- if .Values.agent.gpuAccess.enabled }}
      initContainers:
        - name: nvidia-lib-setup
          image: "{{ .Values.agent.image }}:{{ .Values.agent.tag }}"
          imagePullPolicy: {{ .Values.agent.pullPolicy }}
          command:
            - sh
            - -lc
            - mkdir -p /opt/nvidia/lib/minimal && cp -f /opt/nvidia/lib/source/libnvidia-ml.so.1 /opt/nvidia/lib/minimal/libnvidia-ml.so.1
          volumeMounts:
            - name: nvidia-lib-source
              mountPath: /opt/nvidia/lib/source/libnvidia-ml.so.1
            - name: nvidia-lib-minimal
              mountPath: /opt/nvidia/lib/minimal
      {{- end }}
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image }}:{{ .Values.ollama.tag }}"
          imagePullPolicy: {{ .Values.ollama.pullPolicy }}
          {{- if and .Values.modelBootstrap.enabled (gt (len .Values.modelBootstrap.models) 0) }}
          command:
            - /bin/sh
            - /opt/ollama-runtime/bootstrap.sh
          env:
            - name: MODEL_BOOTSTRAP_WAIT_SECONDS
              value: {{ .Values.modelBootstrap.waitSeconds | quote }}
            - name: MODEL_BOOTSTRAP_RECREATE_EXISTING
              value: {{ .Values.modelBootstrap.recreateExisting | quote }}
          {{- end }}
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          ports:
            - name: ollama
              containerPort: {{ .Values.ollama.servicePort }}
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
            {{- if and .Values.modelBootstrap.enabled (gt (len .Values.modelBootstrap.models) 0) }}
            - name: model-bootstrap
              mountPath: /opt/ollama-runtime
              readOnly: true
            {{- end }}
          readinessProbe:
            httpGet:
              path: /api/version
              port: {{ .Values.ollama.servicePort }}
          livenessProbe:
            httpGet:
              path: /api/version
              port: {{ .Values.ollama.servicePort }}
        - name: agent
          image: "{{ .Values.agent.image }}:{{ .Values.agent.tag }}"
          imagePullPolicy: {{ .Values.agent.pullPolicy }}
          {{- if .Values.agent.gpuAccess.enabled }}
          securityContext:
            privileged: {{ .Values.agent.gpuAccess.privileged }}
            allowPrivilegeEscalation: true
          {{- end }}
          ports:
            - name: agent
              containerPort: {{ .Values.agent.servicePort }}
          env:
            - name: OLLAMA_BASE_URL
              value: http://localhost:{{ .Values.ollama.servicePort }}
            - name: BENCH_AGENT_API_KEY
              value: {{ .Values.agent.apiKey | quote }}
            {{- if .Values.agent.gpuAccess.enabled }}
            - name: PATH
              value: /opt/nvidia/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: LD_LIBRARY_PATH
              value: /opt/nvidia/lib/minimal
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: utility,compute
            {{- end }}
          {{- if .Values.agent.gpuAccess.enabled }}
          volumeMounts:
            - name: nvidia-bin
              mountPath: /opt/nvidia/bin
            - name: nvidia-lib-minimal
              mountPath: /opt/nvidia/lib/minimal
            - name: nvidiactl
              mountPath: /dev/nvidiactl
            - name: nvidia0
              mountPath: /dev/nvidia0
            - name: nvidia-uvm
              mountPath: /dev/nvidia-uvm
            - name: nvidia-uvm-tools
              mountPath: /dev/nvidia-uvm-tools
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.agent.servicePort }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.agent.servicePort }}
      volumes:
        - name: ollama-data
          hostPath:
            path: {{ .Values.persistence.hostPath }}
            type: DirectoryOrCreate
        {{- if and .Values.modelBootstrap.enabled (gt (len .Values.modelBootstrap.models) 0) }}
        - name: model-bootstrap
          configMap:
            name: ollama-runtime-model-bootstrap
            defaultMode: 0555
        {{- end }}
        {{- if .Values.agent.gpuAccess.enabled }}
        - name: nvidia-bin
          hostPath:
            path: {{ .Values.agent.gpuAccess.hostBinPath }}
            type: Directory
        - name: nvidia-lib-source
          hostPath:
            path: {{ .Values.agent.gpuAccess.hostLibFile }}
            type: File
        - name: nvidia-lib-minimal
          emptyDir: {}
        - name: nvidiactl
          hostPath:
            path: {{ .Values.agent.gpuAccess.hostDevPath }}/nvidiactl
            type: CharDevice
        - name: nvidia0
          hostPath:
            path: {{ .Values.agent.gpuAccess.hostDevPath }}/nvidia0
            type: CharDevice
        - name: nvidia-uvm
          hostPath:
            path: {{ .Values.agent.gpuAccess.hostDevPath }}/nvidia-uvm
            type: CharDevice
        - name: nvidia-uvm-tools
          hostPath:
            path: {{ .Values.agent.gpuAccess.hostDevPath }}/nvidia-uvm-tools
            type: CharDevice
        {{- end }}
