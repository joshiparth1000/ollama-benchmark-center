{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "obc.name" . }}
  labels:
    {{- include "obc.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "obc.name" $ }}-{{ .service }}
                port:
                  number: {{ ternary $.Values.backend.service.port $.Values.frontend.service.port (eq .service "backend") }}
          {{- end }}
    {{- end }}
{{- end }}
